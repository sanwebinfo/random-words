description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v5.0.0
      with:
        version: 11.5.0
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24.16.0'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite